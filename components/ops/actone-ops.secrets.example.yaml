# ActWise Ops — per-environment ActOne passwords.
#
# Copy to `actone-ops.secrets.yaml` (gitignored) and fill in. Keys are environment
# names from `actone-ops.yaml`. Never commit the real file.
#
# Password precedence (highest first):
#   1. --password flag / explicit override
#   2. env var  ACTONE_PASSWORD__<ENV>   (e.g. ACTONE_PASSWORD__POPULAR_QAS_DEV)
#   3. this secrets file
#   4. global env var  ACTONE_PASSWORD
#   5. the environment's .env value (default env only)

secrets:
  popular-qas-dev: "change-me"
  # prod: "change-me"
