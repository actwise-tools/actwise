<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ActWise agent</title>
  <link rel="icon" href="assets/nice-smile.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,-50..200" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="portal.css" />
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
</head>
<body>
  <div id="app-root">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">A</div>
        <span>ActWise</span>
      </div>
      <nav class="nav">
        <a class="nav-item" href="index.html">
          <span class="material-symbols-rounded">home</span>
          <span>Home</span>
        </a>
        <a class="nav-item active" href="agent.html">
          <span class="material-symbols-rounded">auto_awesome</span>
          <span>Agent</span>
        </a>
      </nav>
      <div class="sidebar-footer">ActWise · NICE Actimize toolkit</div>
    </aside>

    <main class="main agent-main">
      <div class="topbar">
        <div class="greeting">
          ActWise agent
          <span class="sub">Ask anything about Actimize docs, data, or operations.</span>
        </div>
        <div class="topbar-note">First use asks you to sign in with your Microsoft account inside the chat.</div>
      </div>

      <div class="agent-frame">
        <div id="webchat" role="main"></div>
        <div id="webchat-status" class="webchat-status">Connecting to ActWise…</div>
      </div>
    </main>
  </div>

  <script>
    (async function () {
      const statusEl = document.getElementById('webchat-status');
      const rootEl = document.getElementById('webchat');
      const styleOptions = {
        hideUploadButton: true,
        backgroundColor: 'transparent',
        bubbleBackground: '#ffffff',
        bubbleTextColor: '#1a1a2e',
        bubbleFromUserBackground: '#3b3bff',
        bubbleFromUserTextColor: '#ffffff',
        bubbleBorderRadius: 14,
        bubbleFromUserBorderRadius: 14,
        sendBoxBackground: '#ffffff',
        sendBoxButtonColor: '#3b3bff',
        accent: '#3b3bff',
        primaryFont: "'Be Vietnam Pro', system-ui, sans-serif"
      };

      try {
        // If page-level SSO is enabled later, attach the Entra access token here.
        const headers = {};
        const token = window.__ENTRA_ACCESS_TOKEN;
        if (token) headers['Authorization'] = 'Bearer ' + token;

        const res = await fetch('/api/directline/token', { method: 'POST', headers });
        if (!res.ok) throw new Error('token endpoint returned ' + res.status);
        const { token: dlToken, domain } = await res.json();

        const directLine = window.WebChat.createDirectLine({ token: dlToken, domain });
        window.WebChat.renderWebChat({ directLine, styleOptions }, rootEl);
        statusEl.style.display = 'none';
      } catch (err) {
        statusEl.textContent =
          'Could not connect to the agent. Make sure the portal backend is running. (' +
          err.message + ')';
        statusEl.classList.add('error');
      }
    })();
  </script>
</body>
</html>
