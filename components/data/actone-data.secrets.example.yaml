# ActWise Data — per-environment DB passwords.
#
# Copy to `actone-data.secrets.yaml` (gitignored) and fill in. Keys are profile
# names from `actone-data.yaml`. Never commit the real file.
#
# Password precedence (highest first):
#   1. --password flag / explicit override
#   2. env var  ACTONE_DB_PASSWORD__<PROFILE>   (e.g. ACTONE_DB_PASSWORD__PROD_EU)
#   3. this secrets file
#   4. global env var  ACTONE_DB_PASSWORD
#   5. built-in default (local only)

secrets:
  dev: "change-me"
  # prod: "change-me"
  # staging: "change-me"
